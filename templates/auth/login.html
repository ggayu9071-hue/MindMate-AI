<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MindMate AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="card" style="width:420px; margin:80px auto; text-align:center;">

    <h1 style="margin-bottom:10px;">
        Welcome Back 💜
    </h1>

    <p style="margin-bottom:30px; color:#64748B;">
        Continue your mental wellness journey.
    </p>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
            style="
                width:100%;
                padding:15px;
                margin-bottom:20px;
                border:1px solid #ccc;
                border-radius:10px;
                font-size:16px;
            ">

        <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
            style="
                width:100%;
                padding:15px;
                margin-bottom:25px;
                border:1px solid #ccc;
                border-radius:10px;
                font-size:16px;
            ">

        <button
            type="submit"
            class="btn btn-primary"
            style="width:100%;">

            Login

        </button>

    </form>

    <p style="margin-top:25px;">

        Don't have an account?

        <a href="/register" style="color:#6C63FF; text-decoration:none; font-weight:600;">
            Register
        </a>

    </p>

    <br>

    <a href="/" style="text-decoration:none; color:#64748B;">
        ← Back to Home
    </a>

</div>

</body>
</html>
